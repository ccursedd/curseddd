<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cursed.lat</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root { --r:#e01c1c; --r2:#ff3c3c; --w:#f2f2f2; --dim:rgba(242,242,242,0.45); --g:rgba(255,255,255,0.05); --gb:rgba(255,255,255,0.1); --dark:#050505; --ov:0.5; }
html,body { width:100%; min-height:100%; background:var(--dark); color:var(--w); font-family:'Syne',sans-serif; overflow-x:hidden; }

/* ── BG ── */
#bgLayer { position:fixed; inset:0; z-index:0; background:var(--dark); }
#bgImg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity 0.8s ease; }
#bgVideo { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity 0.8s ease; }
#bgGif { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity 0.8s ease; }
.bg-ov { position:absolute; inset:0; background:rgba(0,0,0,var(--ov)); }
.vignette { position:absolute; inset:0; background:radial-gradient(ellipse 85% 85% at 50% 50%, transparent 25%, rgba(0,0,0,0.85) 100%); }
.scanlines { position:fixed; inset:0; z-index:2; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.055) 2px,rgba(0,0,0,0.055) 4px); pointer-events:none; }
.grain { position:fixed; inset:0; z-index:2; opacity:0.03; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); pointer-events:none; }

/* corner brackets */
.corner { position:fixed; z-index:10; width:30px; height:30px; }
.corner::before,.corner::after { content:''; position:absolute; background:var(--r); opacity:0.55; }
.c-tl{top:14px;left:14px} .c-tl::before{top:0;left:0;width:100%;height:2px} .c-tl::after{top:0;left:0;width:2px;height:100%}
.c-tr{top:14px;right:14px} .c-tr::before{top:0;right:0;width:100%;height:2px} .c-tr::after{top:0;right:0;width:2px;height:100%}
.c-bl{bottom:14px;left:14px} .c-bl::before{bottom:0;left:0;width:100%;height:2px} .c-bl::after{bottom:0;left:0;width:2px;height:100%}
.c-br{bottom:14px;right:14px} .c-br::before{bottom:0;right:0;width:100%;height:2px} .c-br::after{bottom:0;right:0;width:2px;height:100%}

/* ── NAV ── */
nav { position:fixed; top:0; left:0; right:0; z-index:200; display:flex; align-items:center; justify-content:space-between; padding:14px 24px; background:rgba(5,5,5,0.5); border-bottom:1px solid rgba(255,255,255,0.06); backdrop-filter:blur(16px); }
.nav-logo { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:0.1em; color:var(--w); text-decoration:none; }
.nav-logo b { color:var(--r); font-weight:400; }
.nav-back { font-family:'DM Mono',monospace; font-size:9px; color:var(--dim); letter-spacing:0.22em; text-transform:uppercase; text-decoration:none; transition:color 0.2s; }
.nav-back:hover { color:var(--w); }

/* ── LANDING ── */
#landing { position:fixed; inset:0; z-index:500; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; cursor:pointer; background:rgba(0,0,0,0.6); backdrop-filter:blur(5px); transition:opacity 0.9s ease; }
#landing.out { opacity:0; pointer-events:none; }
.land-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(28px,7vw,72px); letter-spacing:0.12em; text-shadow:0 0 30px rgba(224,28,28,0.5); animation:breathe 2.2s ease-in-out infinite; }
.land-sub { font-family:'DM Mono',monospace; font-size:10px; color:rgba(255,255,255,0.25); letter-spacing:0.45em; text-transform:uppercase; animation:breathe 2.2s ease-in-out infinite 0.5s; }
@keyframes breathe { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* ── MAIN ── */
#main { display:none; position:relative; z-index:10; min-height:100vh; padding-bottom:110px; }
#main.show { display:block; animation:rise 0.7s ease forwards; }
@keyframes rise { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

/* ── TABS ── */
.tabs { position:fixed; top:0; left:0; right:0; z-index:199; display:flex; justify-content:center; padding:50px 0 0; gap:4px; pointer-events:none; }
.tab { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.25em; text-transform:uppercase; color:rgba(255,255,255,0.28); cursor:pointer; padding:8px 22px; border-radius:100px; border:1px solid transparent; transition:all 0.22s; pointer-events:all; }
.tab:hover { color:var(--w); }
.tab.active { color:var(--w); background:rgba(255,255,255,0.05); border-color:rgba(255,255,255,0.1); backdrop-filter:blur(14px); }

/* ── PAGES ── */
.page { display:none; max-width:520px; margin:0 auto; padding:0 20px; animation:rise 0.3s ease forwards; }
.page.active { display:block; }

/* ── PROFILE PAGE ── */
.profile-wrap { display:flex; flex-direction:column; align-items:center; text-align:center; padding-top:108px; }

.av-shell { position:relative; width:120px; height:120px; margin-bottom:20px; }
.av-ring { position:absolute; inset:-5px; border-radius:50%; border:2px solid transparent; border-top-color:var(--r2); border-right-color:rgba(224,28,28,0.2); animation:spin 2.4s linear infinite; }
.av-ring2 { position:absolute; inset:-11px; border-radius:50%; border:1px solid transparent; border-bottom-color:rgba(224,28,28,0.12); animation:spin 4.5s linear infinite reverse; }
@keyframes spin { to{transform:rotate(360deg)} }
.av-img { width:120px; height:120px; border-radius:50%; background:rgba(224,28,28,0.1) center/cover; border:2px solid rgba(224,28,28,0.3); overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:42px; }
.av-img img { width:100%; height:100%; object-fit:cover; border-radius:50%; }

.dot-online { position:absolute; bottom:5px; right:5px; width:13px; height:13px; border-radius:50%; background:#3ddc84; border:2.5px solid var(--dark); box-shadow:0 0 10px rgba(61,220,132,0.8); animation:dpulse 2s ease-in-out infinite; }
@keyframes dpulse { 0%,100%{box-shadow:0 0 8px rgba(61,220,132,0.7)} 50%{box-shadow:0 0 18px rgba(61,220,132,1)} }

.dname { font-family:'Bebas Neue',sans-serif; font-size:clamp(52px,12vw,100px); letter-spacing:0.04em; line-height:1; text-shadow:0 0 30px rgba(224,28,28,0.35); animation:nameglitch 7s ease-in-out infinite; margin-bottom:5px; }
.slash { color:var(--r); }
@keyframes nameglitch { 0%,88%,100%{text-shadow:0 0 30px rgba(224,28,28,0.35);transform:none} 89%{transform:translate(-3px,0);text-shadow:-2px 0 var(--r),2px 0 #00e5ff} 90%{transform:translate(3px,0);text-shadow:2px 0 var(--r),-2px 0 #00e5ff} 91%{transform:none} }

.utag { font-family:'DM Mono',monospace; font-size:12px; color:var(--dim); letter-spacing:0.14em; margin-bottom:28px; }

/* cards */
.card { width:100%; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.09); border-radius:17px; backdrop-filter:blur(18px); padding:18px 22px; margin-bottom:10px; }
.card-r { border-top:1px solid rgba(224,28,28,0.28); }
.stats-row { display:flex; justify-content:space-around; align-items:center; }
.stat { text-align:center; }
.stat-n { font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--r2); line-height:1; }
.stat-l { font-family:'DM Mono',monospace; font-size:9px; color:var(--dim); letter-spacing:0.22em; text-transform:uppercase; margin-top:2px; }
.div-v { width:1px; height:32px; background:rgba(255,255,255,0.08); }
.badges { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; }
.badge { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.18em; text-transform:uppercase; padding:5px 13px; border-radius:100px; color:var(--r2); border:1px solid rgba(224,28,28,0.28); background:rgba(224,28,28,0.06); transition:all 0.2s; }
.badge:hover { background:rgba(224,28,28,0.15); border-color:var(--r2); }

/* about */
.about-wrap { padding-top:108px; display:flex; flex-direction:column; gap:10px; }
.sec-label { font-family:'DM Mono',monospace; font-size:9px; color:rgba(255,255,255,0.28); letter-spacing:0.38em; text-transform:uppercase; margin-bottom:12px; }
.bio-p { font-size:14px; line-height:1.8; color:rgba(255,255,255,0.78); }
.soc-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.soc-link { display:flex; align-items:center; gap:9px; padding:12px 15px; border-radius:13px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.09); backdrop-filter:blur(10px); color:var(--w); font-size:12px; font-weight:600; letter-spacing:0.02em; text-decoration:none; transition:all 0.2s; }
.soc-link:hover { background:rgba(224,28,28,0.1); border-color:rgba(224,28,28,0.3); transform:translateY(-2px); }
.soc-icon { font-size:14px; }

/* ── PLAYER ── */
#player { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); z-index:300; width:min(360px,calc(100vw - 28px)); background:rgba(6,6,6,0.85); border:1px solid rgba(255,255,255,0.09); border-top:1px solid rgba(224,28,28,0.2); border-radius:16px; backdrop-filter:blur(28px); padding:13px 17px 11px; display:none; }
#player.show { display:block; animation:rise 0.5s ease 0.35s both; }
.p-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.p-left { display:flex; align-items:center; gap:10px; min-width:0; }
.eq { display:flex; align-items:flex-end; gap:2.5px; height:14px; flex-shrink:0; }
.eq b { display:block; width:3px; border-radius:2px; background:var(--r2); animation:eqa 0.55s ease-in-out infinite alternate; }
.eq b:nth-child(1){animation-delay:0s} .eq b:nth-child(2){animation-delay:.14s} .eq b:nth-child(3){animation-delay:.28s} .eq b:nth-child(4){animation-delay:.07s}
@keyframes eqa { from{height:3px} to{height:14px} }
.p-song { font-size:12px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.p-time { font-family:'DM Mono',monospace; font-size:10px; color:var(--dim); flex-shrink:0; margin-left:6px; }
.p-track { height:2.5px; border-radius:99px; background:rgba(255,255,255,0.12); overflow:hidden; }
.p-fill { height:100%; width:0%; background:var(--r2); border-radius:99px; transition:width 0.15s linear; }

/* 404 */
.notfound { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:90vh; text-align:center; padding:24px; }
.nf-big { font-family:'Bebas Neue',sans-serif; font-size:100px; color:var(--r); line-height:1; margin-bottom:8px; }
.nf-sub { font-family:'DM Mono',monospace; font-size:12px; color:var(--dim); letter-spacing:0.2em; margin-bottom:28px; }

/* spark */
.spark { position:fixed; pointer-events:none; z-index:9999; width:5px; height:5px; border-radius:50%; animation:sf 0.75s ease-out forwards; }
@keyframes sf { to{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0} }
</style>
</head>
<body>

<div id="bgLayer">
  <img id="bgImg" alt="">
  <video id="bgVideo" autoplay muted loop playsinline></video>
  <img id="bgGif" alt="">
  <div class="bg-ov"></div>
  <div class="vignette"></div>
</div>
<div class="scanlines"></div>
<div class="grain"></div>
<div class="corner c-tl"></div>
<div class="corner c-tr"></div>
<div class="corner c-bl"></div>
<div class="corner c-br"></div>

<nav>
  <a class="nav-logo" href="index.html">cursed<b>.</b>lat</a>
  <a class="nav-back" href="index.html">← home</a>
</nav>

<!-- LANDING -->
<div id="landing">
  <div class="land-title">Click to see motion.</div>
  <div class="land-sub">tap anywhere</div>
</div>

<!-- MAIN -->
<div id="main"></div>

<!-- PLAYER -->
<div id="player">
  <div class="p-row">
    <div class="p-left">
      <div class="eq"><b></b><b></b><b></b><b></b></div>
      <div class="p-song" id="pSong">—</div>
    </div>
    <div class="p-time" id="pTime">0:00 / 0:00</div>
  </div>
  <div class="p-track"><div class="p-fill" id="pFill"></div></div>
</div>

<audio id="bgAudio" preload="auto"></audio>

<script>
const SUPA_URL = 'https://deljvcbenyzjomfaiqmd.supabase.co';
const SUPA_KEY = 'sb_publishable_jzwY4gU9EmwH5ht330EgBQ_XnTa7Dsz';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const params = new URLSearchParams(location.search);
const uname = params.get('u') || '';
let profile = null;

function esc(s) { return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;

async function loadProfile() {
  if (!uname) { render404(); return; }
  const { data } = await sb.from('profiles').select('*').eq('username', uname.toLowerCase()).single();
  if (!data) { render404(); return; }
  profile = data;
  document.title = `cursed.lat/${profile.username}`;

  // increment views
  sb.from('profiles').update({ views: (profile.views||0) + 1 }).eq('id', profile.id);

  // apply bg overlay css var
  if (profile.overlay !== undefined) {
    document.documentElement.style.setProperty('--ov', (profile.overlay/100).toFixed(2));
  }

  // apply background (hidden until landing click)
  if (profile.bg_url) {
    if (profile.bg_type === 'video') {
      document.getElementById('bgVideo').src = profile.bg_url;
    } else if (profile.bg_type === 'gif') {
      document.getElementById('bgGif').src = profile.bg_url;
    } else {
      document.getElementById('bgImg').src = profile.bg_url;
      document.getElementById('bgImg').style.opacity = '1';
    }
  }

  // music
  if (profile.music_url) {
    const audio = document.getElementById('bgAudio');
    audio.src = profile.music_url;
    audio.loop = profile.song_loop !== false;
    document.getElementById('pSong').textContent = profile.song_title || 'unknown track';
    audio.addEventListener('timeupdate', () => {
      const c=audio.currentTime, d=audio.duration||0;
      document.getElementById('pTime').textContent = `${fmt(c)} / ${fmt(d)}`;
      document.getElementById('pFill').style.width = d ? `${(c/d)*100}%` : '0%';
    });
  }

  renderPage();
}

function renderPage() {
  const main = document.getElementById('main');
  const dp = profile.display_name || profile.username;
  const nameParts = dp.split('/');
  const nameHtml = nameParts.length > 1
    ? nameParts.map((p,i) => i < nameParts.length-1 ? esc(p)+'<span class="slash">/</span>' : esc(p)).join('')
    : esc(dp);
  const avEl = profile.avatar_url
    ? `<div class="av-img"><img src="${esc(profile.avatar_url)}" alt=""></div>`
    : `<div class="av-img">👤</div>`;

  const socials = [
    ['discord','💬','Discord'], ['youtube','▶️','YouTube'], ['tiktok','🎵','TikTok'],
    ['instagram','📸','Instagram'], ['twitter','🐦','Twitter'], ['github','🐙','GitHub']
  ].filter(([k]) => profile[k]).map(([k,ico,label]) =>
    `<a class="soc-link" href="${esc(profile[k])}" target="_blank"><span class="soc-icon">${ico}</span>${label}</a>`
  ).join('');

  main.innerHTML = `
    <div class="tabs">
      <div class="tab active" data-pg="pgProfile">${esc(profile.username)}</div>
      <div class="tab" data-pg="pgAbout">About Me</div>
    </div>

    <div class="page active" id="pgProfile">
      <div class="profile-wrap">
        <div class="av-shell">
          <div class="av-ring"></div>
          <div class="av-ring2"></div>
          ${avEl}
          <div class="dot-online"></div>
        </div>
        <div class="dname">${nameHtml}</div>
        <div class="utag">cursed.lat/${esc(profile.username)}</div>
        <div class="card card-r">
          <div class="stats-row">
            <div class="stat"><div class="stat-n">∞</div><div class="stat-l">kills</div></div>
            <div class="div-v"></div>
            <div class="stat"><div class="stat-n">#1</div><div class="stat-l">rank</div></div>
            <div class="div-v"></div>
            <div class="stat"><div class="stat-n">0</div><div class="stat-l">deaths</div></div>
          </div>
        </div>
        <div class="card">
          <div class="badges">
            <span class="badge">cursed.lat</span>
            <span class="badge">verified</span>
            ${profile.music_url ? '<span class="badge">🎵 music</span>' : ''}
            ${profile.bg_url ? '<span class="badge">🖼️ bg</span>' : ''}
          </div>
        </div>
      </div>
    </div>

    <div class="page" id="pgAbout">
      <div class="about-wrap">
        <div class="card card-r">
          <div class="sec-label">About Me</div>
          <div class="bio-p">${profile.bio ? esc(profile.bio) : 'no bio yet.'}</div>
        </div>
        ${socials ? `<div class="card"><div class="sec-label">Socials</div><div class="soc-grid">${socials}</div></div>` : ''}
        <div class="card">
          <div class="sec-label">Share</div>
          <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--r2);cursor:pointer" onclick="navigator.clipboard.writeText('https://cursed.lat/${esc(profile.username)}')">cursed.lat/${esc(profile.username)} 📋</div>
        </div>
      </div>
    </div>
  `;

  // tabs
  main.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => {
      main.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      main.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById(t.dataset.pg).classList.add('active');
    });
  });
}

function render404() {
  document.getElementById('landing').style.display = 'none';
  document.getElementById('main').innerHTML = `
    <div class="notfound">
      <div class="nf-big">404</div>
      <div class="nf-sub">cursed.lat/${esc(uname)} doesn't exist</div>
      <a href="index.html" style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;background:var(--r);color:#fff;padding:12px 26px;border-radius:100px;text-decoration:none;font-weight:700;transition:all 0.2s" onmouseover="this.style.background='#ff3c3c'" onmouseout="this.style.background='#e01c1c'">Claim it →</a>
    </div>`;
  document.getElementById('main').classList.add('show');
}

// ── LANDING CLICK ──
document.getElementById('landing').addEventListener('click', () => {
  document.getElementById('landing').classList.add('out');

  // show bg
  if (profile?.bg_type === 'video') {
    const v = document.getElementById('bgVideo');
    v.muted = false; v.volume = 0;
    v.style.opacity = '1'; v.play().catch(()=>{});
  } else if (profile?.bg_type === 'gif') {
    document.getElementById('bgGif').style.opacity = '1';
  }

  // play music
  const audio = document.getElementById('bgAudio');
  if (audio.src && audio.src !== window.location.href) {
    audio.play().catch(()=>{});
    document.getElementById('player').classList.add('show');
  }

  setTimeout(() => {
    document.getElementById('landing').style.display = 'none';
    document.getElementById('main').classList.add('show');
  }, 900);
});

// sparks
document.addEventListener('click', e => {
  for(let i=0;i<8;i++){
    const s=document.createElement('div'); s.className='spark';
    const a=(i/8)*Math.PI*2, d=30+Math.random()*35;
    s.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;background:${Math.random()>.5?'#e01c1c':'#f2f2f2'}`;
    document.body.appendChild(s); setTimeout(()=>s.remove(),800);
  }
});

loadProfile();
</script>
</body>
</html>
