<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cursed.lat — profile</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --red: #e01c1c;
    --red2: #ff3232;
    --white: #f5f5f5;
    --dim: rgba(255,255,255,0.45);
    --glass: rgba(255,255,255,0.05);
    --glass-b: rgba(255,255,255,0.1);
    --dark: #040404;
  }

  html, body { width:100%; min-height:100%; background:var(--dark); color:var(--white); font-family:'Syne',sans-serif; overflow-x:hidden; }

  #bgVid { position:fixed; inset:0; z-index:0; width:100%; height:100%; object-fit:cover; opacity:0.25; filter:saturate(1.3) contrast(1.1); }
  .vignette { position:fixed; inset:0; z-index:1; background:radial-gradient(ellipse 88% 88% at 50% 50%, transparent 28%, rgba(0,0,0,0.9) 100%); pointer-events:none; }
  .scanlines { position:fixed; inset:0; z-index:2; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px); pointer-events:none; }

  .corner { position:fixed; z-index:10; width:32px; height:32px; }
  .corner::before,.corner::after { content:''; position:absolute; background:var(--red); opacity:0.6; }
  .c-tl{top:14px;left:14px} .c-tl::before{top:0;left:0;width:100%;height:2px} .c-tl::after{top:0;left:0;width:2px;height:100%}
  .c-tr{top:14px;right:14px} .c-tr::before{top:0;right:0;width:100%;height:2px} .c-tr::after{top:0;right:0;width:2px;height:100%}
  .c-bl{bottom:14px;left:14px} .c-bl::before{bottom:0;left:0;width:100%;height:2px} .c-bl::after{bottom:0;left:0;width:2px;height:100%}
  .c-br{bottom:14px;right:14px} .c-br::before{bottom:0;right:0;width:100%;height:2px} .c-br::after{bottom:0;right:0;width:2px;height:100%}

  /* LANDING */
  #landing {
    position:fixed; inset:0; z-index:999;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px;
    cursor:pointer;
    background:rgba(0,0,0,0.5); backdrop-filter:blur(4px);
    transition:opacity 0.85s ease;
  }
  #landing.out { opacity:0; pointer-events:none; }
  .land-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(26px,6vw,66px); letter-spacing:0.12em; text-shadow:0 0 28px rgba(224,28,28,0.45); animation:breathe 2s ease-in-out infinite; }
  .land-sub { font-family:'DM Mono',monospace; font-size:10px; color:rgba(255,255,255,0.25); letter-spacing:0.45em; text-transform:uppercase; animation:breathe 2s ease-in-out infinite 0.4s; }
  @keyframes breathe { 0%,100%{opacity:1} 50%{opacity:0.25} }

  /* NAV */
  nav {
    position:fixed; top:0; left:0; right:0; z-index:200;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 24px;
    background:rgba(4,4,4,0.55); border-bottom:1px solid var(--glass-b); backdrop-filter:blur(18px);
  }
  .nav-logo { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:0.1em; text-decoration:none; color:var(--white); text-shadow:0 0 16px rgba(224,28,28,0.4); }
  .nav-logo span { color:var(--red); }
  .nav-back { font-family:'DM Mono',monospace; font-size:10px; color:var(--dim); letter-spacing:0.2em; text-transform:uppercase; text-decoration:none; transition:color 0.2s; }
  .nav-back:hover { color:var(--white); }

  /* MAIN */
  #main { display:none; position:relative; z-index:10; min-height:100vh; padding-bottom:110px; }
  #main.show { display:block; animation:rise 0.65s ease forwards; }
  @keyframes rise { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

  /* TABS */
  .tabs { position:fixed; top:0; left:0; right:0; z-index:200; display:flex; justify-content:center; padding:52px 0 0; gap:4px; pointer-events:none; }
  .tab { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.25em; text-transform:uppercase; color:rgba(255,255,255,0.3); cursor:pointer; padding:8px 22px; border-radius:100px; border:1px solid transparent; transition:all 0.22s; pointer-events:all; }
  .tab:hover { color:var(--white); }
  .tab.active { color:var(--white); background:var(--glass); border-color:var(--glass-b); backdrop-filter:blur(14px); }

  /* PAGES */
  .page { display:none; max-width:520px; margin:0 auto; padding:0 20px; animation:rise 0.3s ease forwards; }
  .page.active { display:block; }

  /* PROFILE PAGE */
  .profile-wrap { display:flex; flex-direction:column; align-items:center; text-align:center; padding-top:108px; }

  .av-shell { position:relative; width:118px; height:118px; margin-bottom:20px; }
  .av-ring { position:absolute; inset:-5px; border-radius:50%; border:2px solid transparent; border-top-color:var(--red2); border-right-color:rgba(224,28,28,0.2); animation:spin 2.4s linear infinite; }
  .av-ring2 { position:absolute; inset:-10px; border-radius:50%; border:1px solid transparent; border-bottom-color:rgba(224,28,28,0.12); animation:spin 4.2s linear infinite reverse; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .avatar { width:118px; height:118px; border-radius:50%; background:center/cover; border:2px solid rgba(224,28,28,0.3); }
  .avatar-default { width:118px; height:118px; border-radius:50%; background:rgba(224,28,28,0.1); border:2px solid rgba(224,28,28,0.3); display:flex; align-items:center; justify-content:center; font-size:44px; }
  .dot-online { position:absolute; bottom:5px; right:5px; width:13px; height:13px; border-radius:50%; background:#3ddc84; border:2.5px solid var(--dark); box-shadow:0 0 8px rgba(61,220,132,0.7); animation:dpulse 2s ease-in-out infinite; }
  @keyframes dpulse { 0%,100%{box-shadow:0 0 8px rgba(61,220,132,0.7)} 50%{box-shadow:0 0 18px rgba(61,220,132,1)} }

  .dname { font-family:'Bebas Neue',sans-serif; font-size:clamp(48px,11vw,90px); letter-spacing:0.05em; line-height:1; text-shadow:0 0 28px rgba(224,28,28,0.35); animation:nameglitch 7s ease-in-out infinite; margin-bottom:4px; }
  .name-slash { color:var(--red); }
  @keyframes nameglitch { 0%,88%,100%{text-shadow:0 0 28px rgba(224,28,28,0.35);transform:none} 89%{transform:translate(-3px,0);text-shadow:-2px 0 var(--red),2px 0 #00e5ff} 90%{transform:translate(3px,0);text-shadow:2px 0 var(--red),-2px 0 #00e5ff} 91%{transform:none} }

  .utag { font-family:'DM Mono',monospace; font-size:12px; color:var(--dim); letter-spacing:0.14em; margin-bottom:28px; }

  .card { width:100%; background:var(--glass); border:1px solid var(--glass-b); border-radius:16px; backdrop-filter:blur(16px); padding:18px 22px; margin-bottom:10px; }
  .card-accent { border-top:1px solid rgba(224,28,28,0.3); }

  .stats-row { display:flex; justify-content:space-around; align-items:center; }
  .stat { text-align:center; }
  .stat-n { font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--red2); line-height:1; }
  .stat-l { font-family:'DM Mono',monospace; font-size:9px; color:var(--dim); letter-spacing:0.22em; text-transform:uppercase; margin-top:2px; }
  .div-v { width:1px; height:32px; background:var(--glass-b); }

  .badges { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; }
  .badge { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.18em; text-transform:uppercase; padding:5px 13px; border-radius:100px; color:var(--red2); border:1px solid rgba(224,28,28,0.3); background:rgba(224,28,28,0.06); transition:all 0.2s; }
  .badge:hover { background:rgba(224,28,28,0.16); border-color:var(--red2); }

  /* ABOUT PAGE */
  .about-wrap { padding-top:108px; display:flex; flex-direction:column; gap:10px; }
  .sec-label { font-family:'DM Mono',monospace; font-size:9px; color:rgba(255,255,255,0.28); letter-spacing:0.38em; text-transform:uppercase; margin-bottom:12px; }
  .bio-p { font-size:14px; line-height:1.8; color:rgba(255,255,255,0.75); }

  .soc-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .soc-link { display:flex; align-items:center; gap:9px; padding:11px 15px; border-radius:13px; background:var(--glass); border:1px solid var(--glass-b); backdrop-filter:blur(10px); color:var(--white); font-size:12px; font-weight:600; letter-spacing:0.02em; text-decoration:none; transition:all 0.2s; }
  .soc-link:hover { background:rgba(224,28,28,0.1); border-color:rgba(224,28,28,0.3); transform:translateY(-2px); }
  .soc-link .ico { font-size:14px; }

  /* 404 */
  .not-found { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:80vh; text-align:center; padding:24px; }
  .nf-title { font-family:'Bebas Neue',sans-serif; font-size:80px; color:var(--red); line-height:1; margin-bottom:8px; }
  .nf-sub { font-family:'DM Mono',monospace; font-size:12px; color:var(--dim); letter-spacing:0.2em; margin-bottom:28px; }
  .nf-btn { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; padding:12px 28px; border-radius:100px; background:var(--red); color:#fff; text-decoration:none; font-weight:700; transition:all 0.2s; }
  .nf-btn:hover { background:var(--red2); box-shadow:0 0 18px rgba(224,28,28,0.45); }

  /* PLAYER */
  #player { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); z-index:300; width:min(360px,calc(100vw - 28px)); background:rgba(6,6,6,0.82); border:1px solid var(--glass-b); border-top:1px solid rgba(224,28,28,0.2); border-radius:16px; backdrop-filter:blur(28px); padding:13px 17px 11px; display:none; }
  #player.show { display:block; animation:rise 0.5s ease 0.3s both; }
  .p-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .p-left { display:flex; align-items:center; gap:10px; min-width:0; }
  .eq { display:flex; align-items:flex-end; gap:2.5px; height:14px; flex-shrink:0; }
  .eq b { display:block; width:3px; border-radius:2px; background:var(--red2); animation:eqa 0.55s ease-in-out infinite alternate; }
  .eq b:nth-child(1){animation-delay:0s} .eq b:nth-child(2){animation-delay:.14s} .eq b:nth-child(3){animation-delay:.28s} .eq b:nth-child(4){animation-delay:.07s}
  @keyframes eqa { from{height:3px} to{height:14px} }
  .p-song { font-size:12px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .p-time { font-family:'DM Mono',monospace; font-size:10px; color:var(--dim); flex-shrink:0; margin-left:6px; }
  .p-track { height:2.5px; border-radius:99px; background:rgba(255,255,255,0.12); overflow:hidden; }
  .p-fill { height:100%; width:0%; background:var(--red2); border-radius:99px; transition:width 0.15s linear; }

  .spark { position:fixed; pointer-events:none; z-index:999; width:5px; height:5px; border-radius:50%; animation:sparkfly 0.75s ease-out forwards; }
  @keyframes sparkfly { to{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0} }
</style>
</head>
<body>

<video id="bgVid" autoplay muted loop playsinline>
  <source src="https://raw.githubusercontent.com/ccursedd/tty/refs/heads/main/car%20edit.mp4" type="video/mp4">
</video>
<div class="vignette"></div>
<div class="scanlines"></div>
<div class="corner c-tl"></div>
<div class="corner c-tr"></div>
<div class="corner c-bl"></div>
<div class="corner c-br"></div>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="index.html">cursed<span>.</span>lat</a>
  <a class="nav-back" href="index.html">← back</a>
</nav>

<!-- LANDING -->
<div id="landing">
  <div class="land-title">Click to see motion.</div>
  <div class="land-sub">tap anywhere</div>
</div>

<!-- MAIN (filled by JS) -->
<div id="main"></div>

<!-- PLAYER -->
<div id="player">
  <div class="p-row">
    <div class="p-left">
      <div class="eq"><b></b><b></b><b></b><b></b></div>
      <div class="p-song">car edit — cursed.lat</div>
    </div>
    <div class="p-time" id="pTime">0:00 / 0:00</div>
  </div>
  <div class="p-track"><div class="p-fill" id="pFill"></div></div>
</div>

<script>
  // ─── GET USER ───
  const params = new URLSearchParams(location.search);
  const uname  = params.get('u') || '';

  function getUsers() { try { return JSON.parse(localStorage.getItem('cursed_users')||'[]'); } catch { return []; } }
  function escHtml(s) { return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  const user = getUsers().find(u => u.username.toLowerCase() === uname.toLowerCase());

  document.title = user ? `cursed.lat/${user.username}` : 'cursed.lat — not found';

  // ─── BUILD PAGE ───
  const main = document.getElementById('main');

  if (!user) {
    main.innerHTML = `
      <div class="not-found">
        <div class="nf-title">404</div>
        <div class="nf-sub">cursed.lat/${escHtml(uname)} doesn't exist yet</div>
        <a class="nf-btn" href="index.html">claim it →</a>
      </div>
    `;
  } else {
    // format display name — if it contains / keep it, else show as-is
    const rawDisplay = escHtml(user.display || user.username);
    const nameParts  = rawDisplay.split('/');
    const nameHtml   = nameParts.length > 1
      ? nameParts.map((p,i) => i < nameParts.length-1 ? p + '<span class="name-slash">/</span>' : p).join('')
      : rawDisplay;

    const avatarEl = user.avatar
      ? `<div class="avatar" style="background-image:url('${user.avatar}')"></div>`
      : `<div class="avatar-default">👤</div>`;

    main.innerHTML = `
      <div class="tabs">
        <div class="tab active" data-pg="profilePage">${escHtml(user.username)}</div>
        <div class="tab" data-pg="aboutPage">About Me</div>
      </div>

      <div class="page active" id="profilePage">
        <div class="profile-wrap">
          <div class="av-shell">
            <div class="av-ring"></div>
            <div class="av-ring2"></div>
            ${avatarEl}
            <div class="dot-online"></div>
          </div>
          <div class="dname">${nameHtml}</div>
          <div class="utag">cursed.lat/${escHtml(user.username)}</div>

          <div class="card card-accent">
            <div class="stats-row">
              <div class="stat"><div class="stat-n">∞</div><div class="stat-l">kills</div></div>
              <div class="div-v"></div>
              <div class="stat"><div class="stat-n">#1</div><div class="stat-l">rank</div></div>
              <div class="div-v"></div>
              <div class="stat"><div class="stat-n">0</div><div class="stat-l">deaths</div></div>
            </div>
          </div>

          <div class="card">
            <div class="badges">
              <span class="badge">cursed.lat</span>
              <span class="badge">verified</span>
              <span class="badge">online</span>
            </div>
          </div>
        </div>
      </div>

      <div class="page" id="aboutPage">
        <div class="about-wrap">
          <div class="card card-accent">
            <div class="sec-label">About Me</div>
            <div class="bio-p">${user.bio ? escHtml(user.bio) : 'no bio yet.'}</div>
          </div>
          <div class="card">
            <div class="sec-label">Share</div>
            <div class="bio-p" style="font-family:'DM Mono',monospace;font-size:12px;color:var(--dim)">
              cursed.lat/${escHtml(user.username)}
            </div>
          </div>
        </div>
      </div>
    `;

    // tabs
    document.querySelectorAll('.tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
        document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
        t.classList.add('active');
        document.getElementById(t.dataset.pg).classList.add('active');
      });
    });
  }

  // ─── LANDING ───
  const landing = document.getElementById('landing');
  const bgVid   = document.getElementById('bgVid');
  const player  = document.getElementById('player');
  const pFill   = document.getElementById('pFill');
  const pTime   = document.getElementById('pTime');

  landing.addEventListener('click', () => {
    landing.classList.add('out');
    bgVid.muted = false; bgVid.volume = 0.7;
    bgVid.play().catch(()=>{ bgVid.muted=true; bgVid.play(); });
    setTimeout(()=>{
      landing.style.display='none';
      main.classList.add('show');
      player.classList.add('show');
    }, 880);
  });

  const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  bgVid.addEventListener('timeupdate', () => {
    const c=bgVid.currentTime, d=bgVid.duration||0;
    pTime.textContent=`${fmt(c)} / ${fmt(d)}`;
    pFill.style.width=d?`${(c/d)*100}%`:'0%';
  });

  // sparks
  document.addEventListener('click', e=>{
    for(let i=0;i<7;i++){
      const s=document.createElement('div'); s.className='spark';
      const a=(i/7)*Math.PI*2, d=32+Math.random()*30;
      s.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;background:${Math.random()>.5?'#e01c1c':'#f5f5f5'}`;
      document.body.appendChild(s); setTimeout(()=>s.remove(),750);
    }
  });
</script>
</body>
</html>
