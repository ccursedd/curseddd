<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cursed.lat — claim your space</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --r: #e01c1c; --r2: #ff3c3c;
  --w: #f2f2f2; --dim: rgba(242,242,242,0.45);
  --g: rgba(255,255,255,0.05); --gb: rgba(255,255,255,0.1);
  --dark: #050505;
}
html,body { width:100%; min-height:100%; background:var(--dark); color:var(--w); font-family:'Syne',sans-serif; overflow-x:hidden; }

/* ── CANVAS BG ── */
#bgCanvas { position:fixed; inset:0; z-index:0; opacity:0.6; }
.vignette { position:fixed; inset:0; z-index:1; background:radial-gradient(ellipse 100% 100% at 50% 0%, rgba(224,28,28,0.07) 0%, transparent 60%), radial-gradient(ellipse 80% 80% at 50% 100%, rgba(0,0,0,0.95) 0%, transparent 100%); pointer-events:none; }
.grain { position:fixed; inset:0; z-index:2; opacity:0.035; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); pointer-events:none; }

/* ── NAV ── */
nav { position:fixed; top:0; left:0; right:0; z-index:200; display:flex; align-items:center; justify-content:space-between; padding:18px 32px; }
.nav-logo { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:0.1em; color:var(--w); text-decoration:none; }
.nav-logo b { color:var(--r); font-weight:400; }
.nav-right { display:flex; gap:10px; align-items:center; }
.btn { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.2em; text-transform:uppercase; padding:9px 20px; border-radius:100px; cursor:pointer; transition:all 0.2s; border:none; text-decoration:none; display:inline-flex; align-items:center; gap:8px; }
.btn-ghost { background:rgba(255,255,255,0.05); color:var(--dim); border:1px solid var(--gb); }
.btn-ghost:hover { color:var(--w); border-color:rgba(255,255,255,0.22); background:rgba(255,255,255,0.08); }
.btn-red { background:var(--r); color:#fff; font-weight:700; }
.btn-red:hover { background:var(--r2); box-shadow:0 0 22px rgba(224,28,28,0.45); transform:translateY(-1px); }
.btn-google { background:rgba(255,255,255,0.07); color:var(--w); border:1px solid var(--gb); }
.btn-google:hover { background:rgba(255,255,255,0.12); border-color:rgba(255,255,255,0.2); }

/* ── HERO ── */
.hero { position:relative; z-index:10; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:120px 24px 80px; }
.hero-label { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.45em; text-transform:uppercase; color:var(--r); margin-bottom:20px; animation:up 0.7s ease 0.1s both; }
.hero-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(64px,14vw,148px); line-height:0.88; letter-spacing:0.03em; margin-bottom:24px; animation:up 0.7s ease 0.2s both; }
.hero-title .r { color:var(--r); }
.hero-title .stroke { -webkit-text-stroke:1px rgba(255,255,255,0.35); color:transparent; }
.hero-desc { font-size:clamp(14px,1.8vw,17px); color:var(--dim); max-width:420px; line-height:1.7; margin-bottom:48px; animation:up 0.7s ease 0.3s both; }

/* claim input */
.claim-wrap { animation:up 0.7s ease 0.45s both; width:min(480px,100%); margin-bottom:16px; }
.claim-box { display:flex; background:rgba(10,10,10,0.8); border:1px solid var(--gb); border-top:1px solid rgba(224,28,28,0.35); border-radius:14px; overflow:hidden; backdrop-filter:blur(20px); }
.claim-pre { font-family:'DM Mono',monospace; font-size:12px; color:var(--dim); padding:0 14px; display:flex; align-items:center; border-right:1px solid var(--gb); white-space:nowrap; background:rgba(255,255,255,0.02); flex-shrink:0; }
.claim-in { flex:1; background:transparent; border:none; outline:none; font-family:'DM Mono',monospace; font-size:13px; color:var(--w); padding:16px 14px; caret-color:var(--r); }
.claim-in::placeholder { color:rgba(255,255,255,0.18); }
.claim-go { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.18em; text-transform:uppercase; background:var(--r); color:#fff; border:none; padding:0 22px; cursor:pointer; font-weight:700; transition:all 0.2s; flex-shrink:0; }
.claim-go:hover { background:var(--r2); }
.claim-msg { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.1em; min-height:18px; text-align:center; }
.claim-msg.ok { color:#3ddc84; }
.claim-msg.err { color:var(--r2); }

.or-divider { font-family:'DM Mono',monospace; font-size:10px; color:rgba(255,255,255,0.2); letter-spacing:0.3em; text-transform:uppercase; margin:16px 0; animation:up 0.7s ease 0.55s both; }

/* ── STATS ── */
.stats { position:relative; z-index:10; display:flex; justify-content:center; gap:0; border-top:1px solid var(--gb); border-bottom:1px solid var(--gb); background:rgba(0,0,0,0.4); backdrop-filter:blur(14px); }
.stat-item { flex:1; max-width:200px; text-align:center; padding:32px 20px; border-right:1px solid var(--gb); }
.stat-item:last-child { border-right:none; }
.stat-n { font-family:'Bebas Neue',sans-serif; font-size:44px; color:var(--r2); line-height:1; }
.stat-l { font-family:'DM Mono',monospace; font-size:9px; color:var(--dim); letter-spacing:0.3em; text-transform:uppercase; margin-top:4px; }

/* ── PROFILES ── */
.section { position:relative; z-index:10; max-width:1040px; margin:0 auto; padding:72px 24px; }
.sec-hd { display:flex; align-items:baseline; gap:14px; margin-bottom:32px; }
.sec-title { font-family:'Bebas Neue',sans-serif; font-size:34px; letter-spacing:0.06em; }
.sec-sub { font-family:'DM Mono',monospace; font-size:9px; color:var(--dim); letter-spacing:0.32em; text-transform:uppercase; }
.profiles-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; }
.pc { background:var(--g); border:1px solid var(--gb); border-radius:16px; backdrop-filter:blur(14px); padding:20px 18px; cursor:pointer; transition:all 0.22s; text-decoration:none; display:block; animation:up 0.4s ease both; }
.pc:hover { background:rgba(224,28,28,0.07); border-color:rgba(224,28,28,0.3); transform:translateY(-4px); box-shadow:0 12px 40px rgba(0,0,0,0.5); }
.pc-av { width:50px; height:50px; border-radius:50%; background:rgba(224,28,28,0.12) center/cover; border:2px solid rgba(224,28,28,0.25); margin-bottom:13px; display:flex; align-items:center; justify-content:center; font-size:20px; overflow:hidden; }
.pc-av img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.pc-name { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:0.04em; line-height:1; margin-bottom:4px; }
.pc-url { font-family:'DM Mono',monospace; font-size:10px; color:var(--dim); letter-spacing:0.08em; }
.pc-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:#3ddc84; margin-right:5px; box-shadow:0 0 6px rgba(61,220,132,0.8); }

/* ── MODAL ── */
.modal-bg { position:fixed; inset:0; z-index:500; background:rgba(0,0,0,0.75); backdrop-filter:blur(10px); display:flex; align-items:center; justify-content:center; padding:24px; opacity:0; pointer-events:none; transition:opacity 0.3s; }
.modal-bg.open { opacity:1; pointer-events:all; }
.modal { background:rgba(8,8,8,0.97); border:1px solid var(--gb); border-top:1px solid rgba(224,28,28,0.4); border-radius:22px; padding:38px 34px; width:min(420px,100%); transform:translateY(16px) scale(0.98); transition:transform 0.3s; }
.modal-bg.open .modal { transform:translateY(0) scale(1); }
.modal-title { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:0.06em; margin-bottom:6px; }
.modal-sub { font-family:'DM Mono',monospace; font-size:10px; color:var(--dim); letter-spacing:0.15em; margin-bottom:28px; }
.mfield { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
.mlabel { font-family:'DM Mono',monospace; font-size:9px; color:var(--dim); letter-spacing:0.3em; text-transform:uppercase; }
.minput { background:rgba(255,255,255,0.04); border:1px solid var(--gb); border-radius:10px; padding:13px 15px; color:var(--w); font-family:'DM Mono',monospace; font-size:13px; outline:none; transition:border-color 0.2s; caret-color:var(--r); width:100%; }
.minput:focus { border-color:rgba(224,28,28,0.4); }
.minput::placeholder { color:rgba(255,255,255,0.17); }
.merr { font-family:'DM Mono',monospace; font-size:10px; color:var(--r2); letter-spacing:0.1em; min-height:16px; margin-top:4px; }
.mactions { display:flex; gap:10px; margin-top:22px; }
.mbtn { flex:1; padding:14px; border:none; border-radius:10px; cursor:pointer; font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; font-weight:700; transition:all 0.2s; }
.mbtn-red { background:var(--r); color:#fff; }
.mbtn-red:hover { background:var(--r2); box-shadow:0 0 20px rgba(224,28,28,0.4); }
.mbtn-ghost { background:transparent; color:var(--dim); border:1px solid var(--gb); }
.mbtn-ghost:hover { color:var(--w); border-color:rgba(255,255,255,0.22); }

/* success */
.success-wrap { text-align:center; padding:8px 0; }
.success-emoji { font-size:48px; margin-bottom:16px; }
.success-big { font-family:'Bebas Neue',sans-serif; font-size:34px; margin-bottom:8px; }
.success-url { font-family:'DM Mono',monospace; font-size:13px; color:var(--r2); background:rgba(224,28,28,0.08); border:1px solid rgba(224,28,28,0.2); border-radius:10px; padding:11px 16px; margin:14px 0 22px; display:inline-block; letter-spacing:0.06em; cursor:pointer; transition:all 0.2s; }
.success-url:hover { background:rgba(224,28,28,0.14); }

footer { position:relative; z-index:10; text-align:center; padding:28px; border-top:1px solid var(--gb); font-family:'DM Mono',monospace; font-size:10px; color:rgba(255,255,255,0.18); letter-spacing:0.22em; }
footer b { color:var(--r); font-weight:400; }

/* ── TOAST ── */
.toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px); z-index:9999; font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.15em; background:rgba(10,10,10,0.92); border:1px solid var(--gb); border-radius:100px; padding:12px 22px; color:var(--w); opacity:0; transition:all 0.3s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@keyframes up { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

/* spark */
.spark { position:fixed; pointer-events:none; z-index:9999; width:5px; height:5px; border-radius:50%; animation:sf 0.75s ease-out forwards; }
@keyframes sf { to{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0} }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="vignette"></div>
<div class="grain"></div>

<nav>
  <a class="nav-logo" href="index.html">cursed<b>.</b>lat</a>
  <div class="nav-right" id="navRight">
    <button class="btn btn-google" onclick="signInGoogle()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>

<!-- HERO -->
<div class="hero">

    <span class="stroke">PROFILE</span><br>
    <span class="r">YOUR WAY</span>

  <div class="claim-wrap">

  <div class="or-divider">— or sign in with Google —</div>
  <button class="btn btn-google" onclick="signInGoogle()" style="animation: up 0.7s ease 0.6s both">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>

  <div class="modal" id="modalBox"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://deljvcbenyzjomfaiqmd.supabase.co';
const SUPA_KEY = 'sb_publishable_jzwY4gU9EmwH5ht330EgBQ_XnTa7Dsz';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── CANVAS BG ──
(function() {
  const c = document.getElementById('bgCanvas');
  const ctx = c.getContext('2d');
  let W, H, pts = [];
  function resize() {
    W = c.width = innerWidth; H = c.height = innerHeight;
    pts = Array.from({length:60}, () => ({
      x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3,
      r: Math.random()*1.5+0.5
    }));
  }
  window.addEventListener('resize', resize); resize();
  function draw() {
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = 'rgba(5,5,5,1)';
    ctx.fillRect(0,0,W,H);
    pts.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if(p.x<0||p.x>W) p.vx*=-1;
      if(p.y<0||p.y>H) p.vy*=-1;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(224,28,28,0.6)'; ctx.fill();
    });
    pts.forEach((a,i) => pts.slice(i+1).forEach(b => {
      const d = Math.hypot(a.x-b.x,a.y-b.y);
      if(d < 120) {
        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
        ctx.strokeStyle=`rgba(224,28,28,${0.12*(1-d/120)})`; ctx.lineWidth=0.5; ctx.stroke();
      }
    }));
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── AUTH ──
async function signInGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: location.origin + '/dashboard.html' }
  });
  if (error) showToast('Auth error: ' + error.message);
}

// check session on load
sb.auth.getSession().then(({ data }) => {
  if (data.session) {
    const u = data.session.user;
    document.getElementById('navRight').innerHTML = `
      <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--dim)">${u.email}</span>
      <a href="dashboard.html" class="btn btn-ghost">Dashboard</a>
      <button class="btn btn-red" onclick="signOut()">Sign Out</button>
    `;
  }
});

async function signOut() {
  await sb.auth.signOut(); location.reload();
}

// ── PROFILES GRID ──
async function loadGrid() {
  const { data } = await sb.from('profiles').select('username,display_name,avatar_url,created_at').order('created_at',{ascending:false}).limit(12);
  const grid = document.getElementById('grid');
  document.getElementById('statN').textContent = data?.length || 0;
  if (!data?.length) { grid.innerHTML = `<p style="font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);grid-column:1/-1">No profiles yet — be the first!</p>`; return; }
  grid.innerHTML = data.map((u,i) => `
    <a class="pc" href="profile.html?u=${encodeURIComponent(u.username)}" style="animation-delay:${i*0.05}s">
      <div class="pc-av">${u.avatar_url ? `<img src="${esc(u.avatar_url)}" alt="">` : '👤'}</div>
      <div class="pc-name">${esc(u.display_name||u.username)}</div>
      <div class="pc-url"><span class="pc-dot"></span>cursed.lat/${esc(u.username)}</div>
    </a>
  `).join('');
}
loadGrid();

// ── CLAIM ──
function heroClaim() {
  const v = document.getElementById('heroIn').value.trim();
  if (!v) { setMsg('enter a username','err'); return; }
  const e = validateU(v);
  if (e) { setMsg('✕ '+e,'err'); return; }
  setMsg(''); openModal(v);
}
document.getElementById('heroIn').addEventListener('keydown', e => { if(e.key==='Enter') heroClaim(); });
function setMsg(t, cls='') { const el=document.getElementById('heroMsg'); el.textContent=t; el.className='claim-msg'+(cls?' '+cls:''); }

function validateU(u) {
  if (!u) return 'choose a username';
  if (u.length < 2) return 'min 2 characters';
  if (u.length > 24) return 'max 24 characters';
  if (!/^[a-zA-Z0-9_\-\.]+$/.test(u)) return 'letters, numbers, _ - . only';
  return null;
}

function esc(s) { return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ── MODAL ──
function openModal(prefill='') {
  renderClaimForm(prefill);
  document.getElementById('modalBg').classList.add('open');
}
function closeModal() { document.getElementById('modalBg').classList.remove('open'); }
document.getElementById('modalBg').addEventListener('click', e => { if(e.target.id==='modalBg') closeModal(); });

function renderClaimForm(pre='') {
  document.getElementById('modalBox').innerHTML = `
    <div class="modal-title">Claim Username</div>
    <div class="modal-sub">cursed.lat/<span id="mPreview" style="color:var(--r2)">${esc(pre)||'username'}</span></div>
    <div class="mfield"><div class="mlabel">Username</div>
      <input class="minput" id="mU" type="text" placeholder="yourname" maxlength="24" value="${esc(pre)}" spellcheck="false" autocomplete="off">
    </div>
    <div class="mfield"><div class="mlabel">Display Name</div>
      <input class="minput" id="mD" type="text" placeholder="Your Name" maxlength="40">
    </div>
    <div class="mfield"><div class="mlabel">Bio (optional)</div>
      <input class="minput" id="mB" type="text" placeholder="say something..." maxlength="120">
    </div>
    <div class="merr" id="mErr"></div>
    <div class="mactions">
      <button class="mbtn mbtn-ghost" onclick="closeModal()">cancel</button>
      <button class="mbtn mbtn-red" onclick="submitClaim()">claim it →</button>
    </div>
    <div style="margin-top:18px;border-top:1px solid var(--gb);padding-top:18px;text-align:center">
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:0.25em;margin-bottom:12px">OR SIGN IN TO SAVE YOUR PROFILE</div>
      <button class="btn btn-google" style="width:100%;justify-content:center" onclick="signInGoogle()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
    </div>
  `;
  document.getElementById('mU').addEventListener('input', function() {
    document.getElementById('mPreview').textContent = this.value || 'username';
  });
}

async function submitClaim() {
  const uname = document.getElementById('mU').value.trim().toLowerCase();
  const dname = document.getElementById('mD').value.trim();
  const bio   = document.getElementById('mB').value.trim();
  const err   = validateU(uname);
  if (err) { document.getElementById('mErr').textContent = '✕ ' + err; return; }

  const { data: exists } = await sb.from('profiles').select('username').eq('username', uname).single();
  if (exists) { document.getElementById('mErr').textContent = '✕ username already taken'; return; }

  const { data: session } = await sb.auth.getSession();
  const userId = session?.session?.user?.id || null;

  const { error } = await sb.from('profiles').insert({ username: uname, display_name: dname||uname, bio, user_id: userId });
  if (error) { document.getElementById('mErr').textContent = '✕ ' + error.message; return; }

  loadGrid();
  document.getElementById('modalBox').innerHTML = `
    <div class="success-wrap">
      <div class="success-emoji">🎉</div>
      <div class="success-big">You're live!</div>
      <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--dim);margin-bottom:8px">your profile is at</div>
      <div class="success-url" onclick="copyUrl('cursed.lat/${esc(uname)}')">cursed.lat/${esc(uname)} 📋</div>
      <a class="btn btn-red" href="profile.html?u=${encodeURIComponent(uname)}" style="display:inline-flex;margin-bottom:12px">Visit Profile →</a>
      <br>
      <button class="mbtn mbtn-ghost" onclick="closeModal()" style="width:100%;margin-top:6px">close</button>
    </div>
  `;
}

function copyUrl(url) {
  navigator.clipboard.writeText('https://'+url).then(() => showToast('✓ link copied!'));
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── SPARKS ──
document.addEventListener('click', e => {
  for(let i=0;i<8;i++){
    const s=document.createElement('div'); s.className='spark';
    const a=(i/8)*Math.PI*2, d=30+Math.random()*35;
    s.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;background:${Math.random()>.5?'#e01c1c':'#f2f2f2'}`;
    document.body.appendChild(s); setTimeout(()=>s.remove(),800);
  }
});
</script>
</body>
